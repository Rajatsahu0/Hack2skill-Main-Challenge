services:
  - type: web
    name: roamai-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: NODE_TLS_REJECT_UNAUTHORIZED
        value: "0"
